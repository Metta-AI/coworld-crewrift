# Build, certify, and deploy the source-owned Crewrift Prime Coworld package.
#
# Lifecycle:
#   1. Materialize the Prime source manifest from the checked-in template + patch.
#   2. `coworld build` builds the package services from compose.yaml, pins
#      source URLs to this checkout, stamps the next version, and writes the
#      hydrated manifest.
#   3. Certify that exact hydrated manifest, then upload that manifest. Upload
#      reuses the certification proof and does not patch a hosted Coworld.
#
# Required repository secret:
#   SOFTMAX_API_TOKEN  - a TEAM `usr_` token. Set it in
#                        Settings -> Secrets and variables -> Actions.
#                        The `coworld`/`softmax` CLI reads its bearer token from
#                        ~/.softmax/credentials.yaml, NOT from this env var, so the
#                        workflow seeds it headlessly via `softmax set-token`.
#
# The CLI is pinned to Metta main commit 8409100e4d53c2dbf45c8dcec1e95c5ae25c6c48,
# which contains the current source build and package-artifact hydration contract.
name: "Deploy Crewrift Game"

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-game
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SOFTMAX_OBSERVATORY
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v6

      - name: Install coworld CLI
        run: uv pip install --system "coworld @ git+https://github.com/Metta-AI/metta.git@8409100e4d53c2dbf45c8dcec1e95c5ae25c6c48#subdirectory=packages/coworld"

      - uses: docker/setup-buildx-action@v3

      - name: Seed Softmax credentials
        env:
          SOFTMAX_API_TOKEN: ${{ secrets.SOFTMAX_API_TOKEN }}
        run: |
          if [ -z "$SOFTMAX_API_TOKEN" ]; then
            echo "::error::SOFTMAX_API_TOKEN secret is empty. Set a team usr_ token in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          softmax set-token "$SOFTMAX_API_TOKEN" --server https://softmax.com/api
          python -c "from softmax.auth import clear_active_player_session; clear_active_player_session(server='https://softmax.com/api')"

      - name: Resolve next version
        id: ver
        run: |
          NEXT=$(coworld next-version crewrift_prime)
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Deploying crewrift_prime:${NEXT}"

      - name: Materialize Crewrift Prime source manifest
        run: |
          mkdir -p tmp/crewrift-prime/source
          jq -s '
            def merge_patch($patch):
              reduce ($patch | keys_unsorted[]) as $key (.;
                if $patch[$key] == null then del(.[$key])
                elif ($patch[$key] | type) == "object" then
                  .[$key] = (
                    (if (.[$key] | type) == "object" then .[$key] else {} end)
                    | merge_patch($patch[$key])
                  )
                else .[$key] = $patch[$key]
                end
              );
            . as $documents | $documents[0] | merge_patch($documents[1])
          ' \
            coworld_manifest_template.json \
            crewrift-prime/crewrift_prime.patch.json \
            > tmp/crewrift-prime/source/coworld_manifest.json

      - name: Build hydrated Coworld manifest
        run: |
          coworld build \
            --source-context . \
            compose.yaml \
            tmp/crewrift-prime/source/coworld_manifest.json \
            "${{ steps.ver.outputs.version }}" \
            tmp/crewrift-prime/dist/coworld_manifest.json

      - name: Certify hydrated Coworld manifest
        run: |
          coworld certify \
            tmp/crewrift-prime/dist/coworld_manifest.json \
            --no-open-report

      - name: Upload certified Coworld manifest
        run: |
          coworld upload-coworld \
            tmp/crewrift-prime/dist/coworld_manifest.json \
            --no-wait-hosted-smoke
