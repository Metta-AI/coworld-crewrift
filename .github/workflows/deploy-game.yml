# Build and deploy the source-owned Crewrift Prime Coworld package.
#
# Lifecycle:
#   1. Materialize the Prime source manifest from the checked-in template + patch.
#   2. `coworld build` builds the package services from compose.yaml, pins
#      source URLs to this checkout, stamps the next version, and writes the
#      hydrated manifest.
#   3. Upload that exact hydrated manifest. Upload queues hosted certification
#      and does not patch an existing hosted Coworld.
#
# Required repository secret:
#   SOFTMAX_API_TOKEN  - a TEAM `usr_` token. Set it in
#                        Settings -> Secrets and variables -> Actions.
#                        The `coworld`/`softmax` CLI reads its bearer token from
#                        ~/.softmax/credentials.yaml, NOT from this env var, so the
#                        workflow seeds it headlessly via `softmax set-token`.
#
# Coworld 0.1.34 contains the project-owned build and replay-viewer bundle
# contracts used below.
name: "Deploy Crewrift Game"

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      skip_upload:
        description: "Skip coworld upload-coworld (build only)."
        type: boolean
        default: false

concurrency:
  group: deploy-game
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SOFTMAX_OBSERVATORY
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v6

      - name: Install coworld CLI
        run: uv pip install --system coworld==0.1.34

      - uses: treeform/setup-nim-action@v6

      - name: Install Nim dependencies
        run: nimby sync nimby.lock -g

      - uses: emscripten-core/setup-emsdk@v16
        with:
          version: 6.0.3

      - uses: docker/setup-buildx-action@v3

      - name: Preflight Docker (required for build)
        run: |
          docker version
          docker info
          if ! docker compose version >/dev/null 2>&1; then
            echo "docker compose plugin missing; installing docker-compose-plugin..."
            sudo apt-get update
            sudo apt-get install -y docker-compose-plugin
          fi
          docker compose version
          docker ps >/dev/null

      - name: Seed Softmax credentials
        env:
          SOFTMAX_API_TOKEN: ${{ secrets.SOFTMAX_API_TOKEN }}
        run: |
          if [ -z "$SOFTMAX_API_TOKEN" ]; then
            echo "::error::SOFTMAX_API_TOKEN secret is empty. Set a team usr_ token in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          softmax set-token "$SOFTMAX_API_TOKEN" --server https://softmax.com/api
          python -c "from softmax.auth import clear_active_player_session; clear_active_player_session(server='https://softmax.com/api')"

      - name: Resolve next version
        id: ver
        run: |
          NEXT=$(coworld next-version crewrift_prime)
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Deploying crewrift_prime:${NEXT}"

      - name: Materialize Crewrift Prime source manifest
        run: |
          jq -s '
            def merge_patch($patch):
              reduce ($patch | keys_unsorted[]) as $key (.;
                if $patch[$key] == null then del(.[$key])
                elif ($patch[$key] | type) == "object" then
                  .[$key] = (
                    (if (.[$key] | type) == "object" then .[$key] else {} end)
                    | merge_patch($patch[$key])
                  )
                else .[$key] = $patch[$key]
                end
              );
            . as $documents
            | $documents[0]
            | merge_patch($documents[1])
            | del(.game.version)
          ' \
            coworld_manifest_template.json \
            crewrift-prime/crewrift_prime.patch.json \
            > coworld_manifest_prime_template.json

      - name: Build hydrated Coworld manifest
        run: |
          coworld build \
            --project . \
            --template coworld_manifest_prime_template.json \
            --version "${{ steps.ver.outputs.version }}" \
            --output tmp/crewrift-prime/dist/coworld_manifest.json

      - name: Upload hydrated Coworld manifest
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_upload != 'true' }}
        run: |
          coworld upload-coworld \
            tmp/crewrift-prime/dist/coworld_manifest.json \
            --no-wait-hosted-smoke
