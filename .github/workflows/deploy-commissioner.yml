# Publish the REST-only Crewrift Prime commissioner worker image. The worker is
# deliberately not attached with `coworld patch-commissioner`, which is the
# legacy per-round WebSocket deployment path.
name: "Publish Crewrift Prime REST Commissioner"

on:
  push:
    branches: [master]
    paths:
      - 'crewrift-prime/commissioner/**'
      - '.github/workflows/deploy-commissioner.yml'
  workflow_dispatch:

concurrency:
  group: publish-commissioner
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SOFTMAX_OBSERVATORY
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish commissioner worker
        uses: docker/build-push-action@v6
        with:
          context: crewrift-prime/commissioner
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/metta-ai/coworld-crewrift-prime-commissioner:${{ github.sha }}
            ghcr.io/metta-ai/coworld-crewrift-prime-commissioner:latest
